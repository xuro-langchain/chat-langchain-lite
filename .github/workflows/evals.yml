name: Offline Evals

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]

jobs:
  evals:
    # CI is MANUAL-LABEL gated. Engine opens both quick code-fix PRs (no
    # eval gating wanted) and regression-prevention PRs (eval gating
    # wanted). The presenter clicks the `run-evals` label on the latter to
    # fire CI. Manual-labeled events trigger this workflow (unlike
    # GITHUB_TOKEN-driven labels, which don't propagate).
    if: contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
      LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
      LANGSMITH_WORKSPACE_ID: ${{ secrets.LANGSMITH_WORKSPACE_ID }}
      DEMO_PRESENTER: ${{ vars.DEMO_PRESENTER }}
      LANGSMITH_TRACING: "true"
    steps:
      # Run a single "after" experiment on the PR branch. We dropped the
      # "before" run because the most common demo fixes (AGENTS.md prompt,
      # tone) live in Context Hub — the PR diff is empty for those, so
      # before/after would score identically. The pre-seeded baseline
      # experiments (baseline-haiku-…, baseline-sonnet-…) already give
      # the presenter a "before" reference in the dataset's experiment
      # view. The threshold check on this run is what gates merge.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run evals on PR branch
        run: |
          uv run python -m scripts.run_evals --skip-dataset --threshold 0.7 --experiment-prefix "engine-${LANGSMITH_PROJECT}"
