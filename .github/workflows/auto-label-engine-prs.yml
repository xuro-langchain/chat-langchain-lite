name: Auto-label Engine PRs

# Auto-adds the 'run-evals' label to any PR opened by a GitHub App bot
# (e.g. LangSmith Engine). Combined with the label-gated `evals.yml`
# workflow, this means Engine PRs trigger CI evals without the demoer
# having to click the label dropdown mid-demo. Human-opened PRs are not
# auto-labeled, so they can be merged quickly without running CI.

on:
  pull_request:
    types: [opened, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    # GitHub App actor logins end with "[bot]" — that's how we identify
    # Engine vs. a human-opened PR.
    if: endsWith(github.event.pull_request.user.login, '[bot]')
    permissions:
      pull-requests: write
    steps:
      - name: Add run-evals label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --add-label run-evals
