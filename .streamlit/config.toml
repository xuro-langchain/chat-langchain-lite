[theme]
primaryColor = "#f4f4f5"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0f0f0f"
textColor = "#e4e4e7"

# Auto-reload on file changes — important for the live demo: after you
# `git pull` the merged Engine PR, Streamlit picks up the new agent code
# without a manual restart.
[server]
runOnSave = true
