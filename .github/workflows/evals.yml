name: Offline Evals

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, labeled]

jobs:
  evals:
    # Demo-friendly gating: CI only fires when the PR has the 'run-evals'
    # label. For the live demo, you control timing by adding the label
    # right before the moment you want to show before/after experiments.
    # Remove this 'if:' to revert to running on every PR.
    if: contains(github.event.pull_request.labels.*.name, 'run-evals')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Run 'before' evals (base branch)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGCHAIN_TRACING_V2: "true"
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_WORKSPACE_ID: ${{ secrets.LANGSMITH_WORKSPACE_ID }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
        run: |
          uv run python -m scripts.run_evals --skip-dataset --experiment-prefix "before-chat-langchain-lite-demo-$DEMO_USER"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install dependencies (PR branch)
        run: uv sync

      - name: Run 'after' evals (PR branch)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGCHAIN_TRACING_V2: "true"
          LANGSMITH_PROJECT: ${{ secrets.LANGSMITH_PROJECT }}
          LANGSMITH_WORKSPACE_ID: ${{ secrets.LANGSMITH_WORKSPACE_ID }}
          DEMO_USER: ${{ secrets.DEMO_USER }}
        run: |
          uv run python -m scripts.run_evals --skip-dataset --threshold 0.7 --experiment-prefix "after-chat-langchain-lite-demo-$DEMO_USER"
